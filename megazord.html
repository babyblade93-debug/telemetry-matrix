<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.D. Megazord - Extreme PBR Engine</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #010205; 
            font-family: 'Courier New', Courier, monospace;
        }
        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }
        /* Cinematic HUD overlays */
        .hud {
            position: absolute; top: 20px; left: 20px; color: #00f0ff;
            pointer-events: none; text-shadow: 0 0 15px rgba(0, 240, 255, 0.8); z-index: 10;
        }
        .hud h1 { margin: 0; font-size: clamp(18px, 5vw, 28px); letter-spacing: 4px; font-weight: 900; }
        .hud p { margin: 5px 0 0 0; font-size: clamp(10px, 2.5vw, 12px); font-weight: bold; letter-spacing: 1px; color: #fff; }
        
        .scanline {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 9; pointer-events: none; opacity: 0.4;
        }
        .vignette {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(1,2,5,0.9) 100%);
            z-index: 8; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="scanline"></div>
    <div class="vignette"></div>

    <div class="hud">
        <h1>EXTREME_ENGINE_v2</h1>
        <p>PBR SHADERS: ONLINE // ATMOSPHERE: DENSE</p>
        <p>TARGET: S.P.D. DELTA COMMAND</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. SCENE & DENSE ATMOSPHERE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010205);
        scene.fog = new THREE.FogExp2(0x010205, 0.04); 

        // 2. CINEMATIC CAMERA
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // 3. RENDERER (Max settings for realism)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimizes for S25 display
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Cinematic color grading
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. COMPLEX LIGHTING RIG
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Low base light
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffddaa, 2.5); // Warm key light
        mainLight.position.set(10, 20, 15);
        mainLight.castShadow = true;
        mainLight.shadow.bias = -0.001;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const rimLight = new THREE.SpotLight(0x00f0ff, 5); // Intense cyan rim light
        rimLight.position.set(-15, 10, -15);
        rimLight.lookAt(0, 0, 0);
        scene.add(rimLight);

        const fillLight = new THREE.PointLight(0x4444ff, 1.5, 50); // Cool bottom fill
        fillLight.position.set(0, -5, 5);
        scene.add(fillLight);

        // 5. PBR MATERIALS (Clearcoat Automotive Paint style)
        const getPBRMaterial = (hexColor) => new THREE.MeshPhysicalMaterial({ 
            color: hexColor, 
            metalness: 0.9, 
            roughness: 0.2,
            clearcoat: 1.0,         // Simulates car paint clearcoat
            clearcoatRoughness: 0.1,
            reflectivity: 1.0
        });

        const matRed = getPBRMaterial(0xaa0000);   
        const matBlue = getPBRMaterial(0x0022aa);  
        const matGreen = getPBRMaterial(0x008800); 
        const matYellow = getPBRMaterial(0xddaa00);
        const matWhite = getPBRMaterial(0xcccccc); 
        const matBlack = getPBRMaterial(0x111111); 
        
        const matVisor = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 2 });
        const matBadge = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 2 });

        // 6. BUILD MEGAZORD
        const megazord = new THREE.Group();
        
        // Torso 
        const torso = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 2), matRed);
        torso.castShadow = true; torso.receiveShadow = true;
        megazord.add(torso);

        // Chest Plate Detail
        const chest = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 2.2), matBlack);
        chest.position.y = 0.5;
        megazord.add(chest);
        
        const badge = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 2.3), matBadge);
        badge.position.y = 0.5;
        megazord.add(badge);

        // Head & Visor
        const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), matBlack);
        head.position.y = 2.6;
        head.castShadow = true;
        megazord.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.3, 1.3), matVisor);
        visor.position.y = 2.7;
        megazord.add(visor);

        // Arms (Joints added for mechanical look)
        const armGeo = new THREE.BoxGeometry(1.2, 3, 1.2);
        const shoulderGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
        
        const rightShoulder = new THREE.Mesh(shoulderGeo, matBlack);
        rightShoulder.position.set(-2.2, 1.5, 0);
        const rightArm = new THREE.Mesh(armGeo, matBlue);
        rightArm.position.set(0, -1.5, 0);
        rightShoulder.add(rightArm);
        megazord.add(rightShoulder);

        const leftShoulder = new THREE.Mesh(shoulderGeo, matBlack);
        leftShoulder.position.set(2.2, 1.5, 0);
        const leftArm = new THREE.Mesh(armGeo, matGreen);
        leftArm.position.set(0, -1.5, 0);
        leftShoulder.add(leftArm);
        megazord.add(leftShoulder);

        // Legs
        const legGeo = new THREE.BoxGeometry(1.4, 4, 1.4);
        const rightLeg = new THREE.Mesh(legGeo, matYellow);
        rightLeg.position.set(-0.8, -4, 0);
        rightLeg.castShadow = true;
        megazord.add(rightLeg);

        const leftLeg = new THREE.Mesh(legGeo, matWhite);
        leftLeg.position.set(0.8, -4, 0);
        leftLeg.castShadow = true;
        megazord.add(leftLeg);

        megazord.position.y = 1;
        scene.add(megazord);

        // 7. PARTICLE SYSTEM (Floating Sparks/Dust)
        const particleCount = 300;
        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        
        for(let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 40; // Spread across scene
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({
            size: 0.15,
            color: 0xffaa00,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const particleMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particleMesh);

        // 8. RESPONSIVE SIZING & CAMERA ADJUSTMENT
        function updateCamera() {
            camera.aspect = window.innerWidth / window.innerHeight;
            if (window.innerWidth < 600) {
                camera.position.set(0, 2, 30);
            } else {
                camera.position.set(0, 2, 20); 
            }
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', updateCamera);
        updateCamera(); 

        // 9. ANIMATION & PARALLAX TRACKING
        let mouseX = 0; let mouseY = 0;
        
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - window.innerWidth / 2);
            mouseY = (event.clientY - window.innerHeight / 2);
        });
        document.addEventListener('touchmove', (event) => {
            if(event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - window.innerWidth / 2);
                mouseY = (event.touches[0].clientY - window.innerHeight / 2);
            }
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Hover breathing
            megazord.position.y = 1 + Math.sin(elapsedTime * 1.5) * 0.4;

            // Particles floating upwards
            particleMesh.rotation.y = elapsedTime * 0.05;
            particleMesh.position.y = (elapsedTime * 0.5) % 10 - 5;

            // Tracking and Parallax Camera
            let targetX = mouseX * 0.001;
            let targetY = mouseY * 0.001;
            
            megazord.rotation.y += 0.05 * (targetX - megazord.rotation.y);
            megazord.rotation.x += 0.05 * (targetY - megazord.rotation.x);

            // Subtle camera sway for cinematic feel
            camera.position.x += (mouseX * 0.005 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 0.005 - camera.position.y) * 0.05;
            camera.lookAt(0, 1, 0);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
