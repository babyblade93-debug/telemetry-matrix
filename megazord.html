<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.D. Megazord - WebGL Core</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020617; /* Deep space background */
            font-family: 'Courier New', Courier, monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f0ff;
            pointer-events: none;
            text-shadow: 0 0 10px #00f0ff;
        }
        .hud h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .hud p { margin: 5px 0 0 0; font-size: 12px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="hud">
        <h1>DELTA COMMAND CORE</h1>
        <p>SYSTEM: ONLINE // 3D RENDER ENGINE: ACTIVE</p>
        <p>TARGET: SPD MEGAZORD (STYLIZED)</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // 1. SCENE SETUP
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.05); // Adds deep sci-fi fog

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ==========================================
        // 2. LIGHTING (Cinematic & Realistic)
        // ==========================================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(10, 20, 10);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const rimLight = new THREE.PointLight(0x00f0ff, 2, 50); // Cyan rim light
        rimLight.position.set(-10, 5, -10);
        scene.add(rimLight);

        // Grid Floor
        const gridHelper = new THREE.GridHelper(50, 50, 0x00f0ff, 0x111111);
        gridHelper.position.y = -5;
        scene.add(gridHelper);

        // ==========================================
        // 3. MEGAZORD CONSTRUCTION (Procedural Mesh)
        // ==========================================
        const megazord = new THREE.Group();
        
        // PBR Material Settings for Realistic Metal
        const getMetalMaterial = (hexColor) => new THREE.MeshStandardMaterial({ 
            color: hexColor, 
            metalness: 0.85, 
            roughness: 0.2,
            envMapIntensity: 1.0
        });

        const matRed = getMetalMaterial(0xcc0000);   // SPD 1
        const matBlue = getMetalMaterial(0x0044ff);  // SPD 2
        const matGreen = getMetalMaterial(0x00cc00); // SPD 3
        const matYellow = getMetalMaterial(0xffcc00);// SPD 4
        const matWhite = getMetalMaterial(0xeeeeee); // SPD 5 (Using white for Pink/White leg)
        const matBlack = getMetalMaterial(0x222222); // Joints
        const matVisor = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // Glowing Visor

        // A. Torso (Red Delta Runner 1)
        const torsoGeo = new THREE.BoxGeometry(3, 4, 2);
        const torso = new THREE.Mesh(torsoGeo, matRed);
        torso.castShadow = true;
        megazord.add(torso);

        // Chest Plate Detail
        const chestGeo = new THREE.BoxGeometry(2, 1.5, 2.2);
        const chest = new THREE.Mesh(chestGeo, matBlack);
        chest.position.y = 0.5;
        megazord.add(chest);

        // B. Head
        const headGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const head = new THREE.Mesh(headGeo, matBlack);
        head.position.y = 2.6;
        head.castShadow = true;
        megazord.add(head);

        // Visor (Glowing)
        const visorGeo = new THREE.BoxGeometry(1.3, 0.3, 1.3);
        const visor = new THREE.Mesh(visorGeo, matVisor);
        visor.position.y = 2.7;
        megazord.add(visor);

        // C. Right Arm (Blue Delta Runner 2)
        const armGeo = new THREE.BoxGeometry(1.2, 3.5, 1.2);
        const rightArm = new THREE.Mesh(armGeo, matBlue);
        rightArm.position.set(-2.2, 0.5, 0);
        rightArm.castShadow = true;
        megazord.add(rightArm);

        // D. Left Arm (Green Delta Runner 3)
        const leftArm = new THREE.Mesh(armGeo, matGreen);
        leftArm.position.set(2.2, 0.5, 0);
        leftArm.castShadow = true;
        megazord.add(leftArm);

        // E. Right Leg (Yellow Delta Runner 4)
        const legGeo = new THREE.BoxGeometry(1.4, 4, 1.4);
        const rightLeg = new THREE.Mesh(legGeo, matYellow);
        rightLeg.position.set(-0.8, -4, 0);
        rightLeg.castShadow = true;
        megazord.add(rightLeg);

        // F. Left Leg (White/Pink Delta Runner 5)
        const leftLeg = new THREE.Mesh(legGeo, matWhite);
        leftLeg.position.set(0.8, -4, 0);
        leftLeg.castShadow = true;
        megazord.add(leftLeg);

        // Hover positioning
        megazord.position.y = 1;
        scene.add(megazord);

        // ==========================================
        // 4. ANIMATION & INTERACTION
        // ==========================================
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Hover breathing effect
            megazord.position.y = 1 + Math.sin(elapsedTime * 2) * 0.2;

            // Smooth mouse tracking (Megazord looks at your cursor)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            megazord.rotation.y += 0.05 * (targetX - megazord.rotation.y);
            megazord.rotation.x += 0.05 * (targetY - megazord.rotation.x);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
