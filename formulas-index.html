<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Architecture - Formulas Directory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                linear-gradient(0deg, transparent 24%, rgba(165, 243, 252, 0.3) 25%, rgba(165, 243, 252, 0.3) 26%, transparent 27%, transparent 74%, rgba(165, 243, 252, 0.3) 75%, rgba(165, 243, 252, 0.3) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(165, 243, 252, 0.3) 25%, rgba(165, 243, 252, 0.3) 26%, transparent 27%, transparent 74%, rgba(165, 243, 252, 0.3) 75%, rgba(165, 243, 252, 0.3) 76%, transparent 77%, transparent);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #0f172a; 
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .neural-container {
            width: 100%;
            max-width: 1200px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #67e8f9;
            border-radius: 16px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px -5px rgba(6, 182, 212, 0.15), inset 0 0 20px rgba(103, 232, 249, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER & CORE --- */
        .system-header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
        
        .core-node-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .core-pulse {
            width: 70px; height: 70px;
            background: #ffffff;
            border: 4px solid #06b6d4;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px #22d3ee, inset 0 0 15px #67e8f9;
            z-index: 10;
            position: relative;
        }
        .core-pulse::before {
            content: ''; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px;
            border-radius: 50%; border: 2px solid #22d3ee;
            animation: radarPulse 2s cubic-bezier(0.1, 0.7, 1, 0.1) infinite;
        }
        @keyframes radarPulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .core-icon { font-size: 28px; }

        .system-header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            color: #083344;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .system-header p {
            font-family: 'JetBrains Mono', monospace;
            color: #0ea5e9;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
            background: #e0f2fe;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid #bae6fd;
        }

        /* --- NEURAL TREE GRID --- */
        .neural-tree {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }
        
        /* Central neural stem line */
        .neural-tree::before {
            content: ''; position: absolute;
            top: -30px; bottom: 30px; left: 50%;
            width: 4px; background: linear-gradient(to bottom, #06b6d4, #a5f3fc);
            transform: translateX(-50%);
            z-index: 1;
            border-radius: 2px;
        }

        .neural-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        
        /* The main menu block (Mobile Base) */
        .menu-node {
            background: #ffffff;
            border: 2px solid #22d3ee;
            border-radius: 12px;
            width: 90%; 
            max-width: 450px;
            box-shadow: 0 4px 6px rgba(6, 182, 212, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* --- DESKTOP WIDESCREEN ADAPTATION --- */
        @media (min-width: 768px) {
            .menu-node { width: 42%; max-width: none; } 
            
            /* Pushes odd menus to the LEFT */
            .neural-branch:nth-child(odd) { align-items: flex-end; padding-right: 54%; }
            /* Pushes even menus to the RIGHT */
            .neural-branch:nth-child(even) { align-items: flex-start; padding-left: 54%; }
            
            /* Horizontal Cyan Connection Lines for Desktop */
            .neural-branch::before {
                content: ''; position: absolute; top: 35px; left: 50%; width: 50%; height: 3px;
                background: linear-gradient(90deg, #06b6d4, transparent); z-index: -1;
            }
            .neural-branch:nth-child(odd)::before {
                left: auto; right: 50%;
                background: linear-gradient(270deg, #06b6d4, transparent);
            }
        }

        .menu-node:hover {
            transform: translateY(-4px);
            border-color: #06b6d4;
            box-shadow: 0 15px 25px -5px rgba(6, 182, 212, 0.3), 0 0 15px rgba(34, 211, 238, 0.4);
        }
        
        .menu-header {
            background: linear-gradient(90deg, #164e63, #0891b2);
            color: #ffffff;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #67e8f9;
        }

        /* Endpoints (Dropdown links) */
        .endpoint-list { list-style: none; padding: 0; margin: 0; background: #f8fafc; }
        .endpoint-item { border-bottom: 1px solid #cffafe; }
        .endpoint-item:last-child { border-bottom: none; }
        
        .endpoint-link {
            display: flex; align-items: center; padding: 14px 20px;
            color: #0f172a; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: all 0.2s ease; position: relative;
        }
        .endpoint-link::before {
            content: '⊦'; margin-right: 12px; color: #06b6d4; font-weight: 800; font-size: 18px;
        }
        .endpoint-link:hover {
            background: #ecfeff; color: #0891b2; padding-left: 26px;
        }
    </style>
</head>
<body>

    <div class="neural-container">
        
        <div class="system-header">
            <div class="core-node-container">
                <div class="core-pulse"><span class="core-icon">📂</span></div>
            </div>
            <h1>Formulas Architecture</h1>
            <p>LOCALIZED DIRECTORY // ACTIVE</p>
        </div>
        
        <div class="neural-tree" id="render-target"></div>
        
    </div>

    <script>
        // =====================================================================
        // LOCALIZED SITEMAP: FORMULAS ONLY
        // =====================================================================
        const portalStructure = [
            {
                menuName: "Advanced Excel and G-Sheets",
                icon: "📊",
                dropdowns: [
                    { name: "Launch Matrix Engine", link: "excel-matrix.html" }
                ]
            },
            {
                menuName: "Advanced Word",
                icon: "📄",
                dropdowns: [
                    { name: "Phase 1: Core Formatting", link: "docs-matrix.html" },
                    { name: "Phase 2: Enterprise Automation", link: "docs-advanced.html" }
                ]
            },
            {
                menuName: "PowerPoint",
                icon: "📽️",
                dropdowns: [
                    { name: "Launch Matrix Engine", link: "ppt-matrix.html" }
                ]
            }
        ];

        // =====================================================================
        // NEURAL RENDERING ENGINE
        // =====================================================================
        const renderTarget = document.getElementById('render-target');

        portalStructure.forEach(section => {
            const branch = document.createElement('div');
            branch.className = 'neural-branch';

            const node = document.createElement('div');
            node.className = 'menu-node';

            const header = document.createElement('div');
            header.className = 'menu-header';
            header.innerHTML = `<span>${section.icon}</span> ${section.menuName}`;
            node.appendChild(header);

            if (section.dropdowns && section.dropdowns.length > 0) {
                const list = document.createElement('ul');
                list.className = 'endpoint-list';
                
                section.dropdowns.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'endpoint-item';
                    li.innerHTML = `<a href="${item.link}" class="endpoint-link">${item.name}</a>`;
                    list.appendChild(li);
                });
                node.appendChild(list);
            }

            branch.appendChild(node);
            renderTarget.appendChild(branch);
        });
    </script>
</body>
</html>
