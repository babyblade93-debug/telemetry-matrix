<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guidance Portal - Auto-Detect Arcade Node</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        html, body { 
            width: 100%; min-height: 100%; 
            background-color: #020617; color: #cffafe; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 10px; overflow: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }

        /* --- HARDWARE SCAN BOOT SCREEN --- */
        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            font-family: 'JetBrains Mono', monospace; color: #00f0ff;
            transition: opacity 0.5s ease-out;
        }
        .scan-text { font-size: 14px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px #00f0ff; }
        .scan-bar-container { width: 200px; height: 4px; background: #0f172a; border: 1px solid #0891b2; margin-top: 10px; }
        .scan-bar-fill { height: 100%; width: 0%; background: #00f0ff; box-shadow: 0 0 10px #00f0ff; transition: width 0.1s linear; }

        .engine-container { width: 100%; max-width: 600px; z-index: 10; display: flex; flex-direction: column; gap: 15px; opacity: 0; transition: opacity 0.5s ease-in; }

        .system-header {
            text-align: center; padding: 10px;
            border-top: 2px solid #00f0ff; border-bottom: 2px solid #00f0ff;
            background: rgba(0, 240, 255, 0.05); box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        .system-header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(16px, 5vw, 24px); font-weight: 900; color: #ffffff; letter-spacing: 3px; text-shadow: 0 0 10px #00f0ff; }
        .system-header p { color: #00f0ff; font-size: 10px; font-weight: 700; letter-spacing: 2px; margin-top: 5px; }

        .control-panel {
            background: rgba(15, 23, 42, 0.8); border: 1px solid #0891b2; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.1), inset 0 0 15px rgba(6, 182, 212, 0.1);
        }

        /* AUTO-DETECTED SETTINGS */
        .platform-badge {
            background: rgba(0, 240, 255, 0.1); border: 1px solid #00f0ff; color: #00f0ff;
            padding: 5px 10px; text-align: center; font-size: 11px; font-weight: bold;
            letter-spacing: 2px; margin-bottom: 5px; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .matrix-select {
            background: rgba(2, 6, 23, 0.8); border: 1px solid #0891b2; color: #cffafe;
            padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
            outline: none; width: 100%; cursor: pointer; text-transform: uppercase;
        }
        .matrix-select:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: #cffafe;
            border-bottom: 1px solid #0891b2; padding-bottom: 10px;
        }
        .score-display { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.8); font-size: 20px; }

        .canvas-container { position: relative; margin: 0 auto; width: 100%; max-width: 400px; aspect-ratio: 1/1; }
        canvas {
            width: 100%; height: 100%; background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            border: 2px solid #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); display: block;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5;
        }

        .action-btn {
            background: rgba(0, 240, 255, 0.1); border: 1px solid #00f0ff; color: #00f0ff;
            padding: 12px 20px; text-align: center; font-weight: 900;
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-size: 14px;
            transition: 0.2s; cursor: pointer; text-shadow: 0 0 5px #00f0ff;
        }
        .action-btn:hover, .action-btn:active { background: #00f0ff; color: #020617; box-shadow: 0 0 20px #00f0ff; }

        /* TACTICAL D-PAD (HIDDEN ON PC) */
        .d-pad {
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px);
            gap: 5px; justify-content: center; margin-top: 5px;
        }
        .d-btn {
            background: rgba(8, 145, 178, 0.2); border: 1px solid #0891b2; color: #67e8f9;
            font-size: 20px; font-weight: bold; border-radius: 4px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); transition: 0.1s;
        }
        .d-btn:active { background: #00f0ff; color: #020617; box-shadow: 0 0 15px #00f0ff; transform: scale(0.95); }
        .up { grid-column: 2; grid-row: 1; } .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; } .down { grid-column: 2; grid-row: 3; }

        .shake { animation: hardShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes hardShake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-8px, 5px, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(8px, -5px, 0); }
        }

    </style>
</head>
<body>

    <div id="bootScreen">
        <div class="scan-text" id="scanText">INITIATING HARDWARE SCAN...</div>
        <div class="scan-bar-container">
            <div class="scan-bar-fill" id="scanBar"></div>
        </div>
    </div>

    <div class="engine-container" id="mainEngine">
        <div class="system-header">
            <h1>EXTREME_ARCADE</h1>
            <p>DYNAMIC PLATFORM DETECTION ACTIVE</p>
        </div>

        <div class="control-panel">
            
            <div class="platform-badge" id="platformBadge">DETECTING...</div>

            <div>
                <select class="matrix-select" id="gameSelect">
                    </select>
            </div>

            <div class="status-bar">
                <div>SYS: <span style="color: #10b981;">ONLINE</span></div>
                <div>DATA EXTR: <span class="score-display" id="scoreText">0</span></div>
            </div>

            <div class="canvas-container">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div class="overlay" id="startOverlay">
                    <button class="action-btn" id="startBtn">INITIALIZE ENGINE</button>
                </div>
            </div>

            <div class="d-pad" id="dPadContainer">
                <div class="d-btn up" id="btnU">▲</div>
                <div class="d-btn left" id="btnL">◀</div>
                <div class="d-btn right" id="btnR">▶</div>
                <div class="d-btn down" id="btnD">▼</div>
            </div>
        </div>
    </div>

    <script>
        // --- HARDWARE AUTO-DETECT SEQUENCE ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const bootScreen = document.getElementById('bootScreen');
        const scanText = document.getElementById('scanText');
        const scanBar = document.getElementById('scanBar');
        const mainEngine = document.getElementById('mainEngine');
        
        const platformBadge = document.getElementById('platformBadge');
        const gameSelect = document.getElementById('gameSelect');
        const dPadContainer = document.getElementById('dPadContainer');

        let scanProgress = 0;
        const bootInterval = setInterval(() => {
            scanProgress += 10;
            scanBar.style.width = scanProgress + '%';
            
            if (scanProgress === 40) scanText.innerText = "ANALYZING USER AGENT...";
            if (scanProgress === 80) scanText.innerText = "CONFIGURING UI PROTOCOLS...";
            
            if (scanProgress >= 100) {
                clearInterval(bootInterval);
                finishBootSequence();
            }
        }, 100);

        function finishBootSequence() {
            if (isMobile) {
                scanText.innerText = "MOBILE HARDWARE DETECTED";
                platformBadge.innerText = "[ MOBILE PLATFORM // TOUCH PROTOCOLS ENGAGED ]";
                gameSelect.innerHTML = `
                    <option value="snake">CYBER-SNAKE (Touch Optimized)</option>
                    <option disabled>NEON-SWIPE [LOCKED]</option>
                    <option disabled>DATA-TAP [LOCKED]</option>
                `;
                dPadContainer.style.display = 'grid'; // Show D-Pad
            } else {
                scanText.innerText = "DESKTOP HARDWARE DETECTED";
                platformBadge.innerText = "[ DESKTOP PLATFORM // KEYBOARD PROTOCOLS ENGAGED ]";
                gameSelect.innerHTML = `
                    <option value="snake">CYBER-SNAKE (WASD / Arrows)</option>
                    <option disabled>QUANTUM-TETRIS [LOCKED]</option>
                    <option disabled>DATA-MATCH [LOCKED]</option>
                `;
                dPadContainer.style.display = 'none'; // Hide D-Pad for cleaner UI
            }

            setTimeout(() => {
                bootScreen.style.opacity = '0';
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    mainEngine.style.opacity = '1';
                }, 500);
            }, 500);
        }


        // --- GAME ENGINE (CYBER-SNAKE) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');
        const startBtn = document.getElementById('startBtn');
        const startOverlay = document.getElementById('startOverlay');

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'eat') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'crash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'move') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            }
        }

        const gridSize = 20; const tileCount = canvas.width / gridSize;
        let snake = []; let apple = {}; let particles = [];
        let vx = 0; let vy = 0; let score = 0;
        let gameActive = false; let lastTime = 0; let accumulator = 0; const stepTime = 100; 

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02;
                this.color = color; this.size = Math.random() * 4 + 2;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            }
        }

        function createExplosion(x, y, color, count) {
            for(let i=0; i<count; i++) particles.push(new Particle(x * gridSize + gridSize/2, y * gridSize + gridSize/2, color));
        }

        function placeApple() {
            apple = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            for(let i=0; i<snake.length; i++) if(snake[i].x === apple.x && snake[i].y === apple.y) { placeApple(); break; }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}]; vx = 0; vy = 0; score = 0; scoreText.innerText = score;
            particles = []; placeApple(); gameActive = true;
            startOverlay.style.display = 'none'; canvas.classList.remove('shake');
            requestAnimationFrame(gameLoop);
        }

        function updateLogic() {
            if (vx === 0 && vy === 0) return;
            let headX = snake[0].x + vx; let headY = snake[0].y + vy;
            
            if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) return gameOver();
            for(let i=0; i<snake.length; i++) if(snake[i].x === headX && snake[i].y === headY) return gameOver();
            
            snake.unshift({x: headX, y: headY});
            
            if (headX === apple.x && headY === apple.y) {
                score += 15; scoreText.innerText = score;
                playSound('eat'); createExplosion(apple.x, apple.y, "#ef4444", 25); placeApple();
            } else { snake.pop(); }
        }

        function gameOver() {
            gameActive = false; playSound('crash'); canvas.classList.add('shake');
            createExplosion(snake[0].x, snake[0].y, "#00f0ff", 50); 
            setTimeout(() => { startOverlay.style.display = 'flex'; startBtn.innerText = "SYSTEM REBOOT"; }, 1000);
        }

        function drawGame() {
            ctx.fillStyle = "rgba(2, 6, 23, 0.3)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 240, 255, 0.05)";
            for(let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height);
                ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }

            let pulse = Math.abs(Math.sin(Date.now() / 200)) * 5;
            ctx.fillStyle = "#ef4444"; ctx.shadowBlur = 15 + pulse; ctx.shadowColor = "#ef4444";
            ctx.fillRect(apple.x * gridSize + 3, apple.y * gridSize + 3, gridSize - 6, gridSize - 6); ctx.shadowBlur = 0;
            
            for(let i=0; i<snake.length; i++) {
                let segmentRatio = 1 - (i / snake.length);
                if(i === 0) { ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 15; ctx.shadowColor = "#00f0ff"; } 
                else { ctx.fillStyle = `rgba(0, 240, 255, ${segmentRatio})`; ctx.shadowBlur = 5; }
                let shrink = i * 0.3; 
                ctx.fillRect(snake[i].x * gridSize + shrink/2, snake[i].y * gridSize + shrink/2, gridSize - shrink, gridSize - shrink);
            }
            ctx.shadowBlur = 0;

            for(let i=particles.length-1; i>=0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function gameLoop(timestamp) {
            if(!gameActive && particles.length === 0) return;
            let deltaTime = timestamp - lastTime; lastTime = timestamp; accumulator += deltaTime;
            while (accumulator >= stepTime) { if (gameActive) updateLogic(); accumulator -= stepTime; }
            drawGame(); requestAnimationFrame(gameLoop);
        }

        function setDir(x, y) {
            if (!gameActive) return;
            if (vx === -x && x !== 0) return; if (vy === -y && y !== 0) return;
            vx = x; vy = y; playSound('move');
        }

        startBtn.addEventListener('click', () => { initAudio(); resetGame(); });

        // Touch controls
        document.getElementById('btnU').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(0, -1); });
        document.getElementById('btnD').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(0, 1); });
        document.getElementById('btnL').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(-1, 0); });
        document.getElementById('btnR').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(1, 0); });
        
        // Mouse fallback for UI buttons on PC (if they somehow unhide them)
        document.getElementById('btnU').addEventListener('mousedown', () => setDir(0, -1));
        document.getElementById('btnD').addEventListener('mousedown', () => setDir(0, 1));
        document.getElementById('btnL').addEventListener('mousedown', () => setDir(-1, 0));
        document.getElementById('btnR').addEventListener('mousedown', () => setDir(1, 0));

        // Keyboard controls
        document.addEventListener('keydown', e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", "w", "a", "s", "d"].indexOf(e.key) > -1) e.preventDefault();
            if(e.key === 'ArrowUp' || e.key === 'w') setDir(0, -1);
            if(e.key === 'ArrowDown' || e.key === 's') setDir(0, 1);
            if(e.key === 'ArrowLeft' || e.key === 'a') setDir(-1, 0);
            if(e.key === 'ArrowRight' || e.key === 'd') setDir(1, 0);
        });

        ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    </script>
</body>
</html>
