<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Portal - Call Intercept Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        html, body { 
            width: 100%; min-height: 100%; 
            background-color: #020617; 
            color: #cffafe; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 10px;
        }

        /* --- TACTICAL BACKGROUND --- */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }

        .engine-container {
            width: 100%; max-width: 900px; z-index: 10;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* --- HEADER --- */
        .system-header {
            text-align: center; padding: 15px 10px;
            border-top: 2px solid #00f0ff; border-bottom: 2px solid #00f0ff;
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        .system-header h1 {
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(16px, 5vw, 28px); font-weight: 900; color: #ffffff; 
            letter-spacing: 3px; text-shadow: 0 0 10px #00f0ff;
        }
        .system-header p {
            color: #00f0ff; font-size: clamp(9px, 2.5vw, 12px); font-weight: 700; 
            letter-spacing: 2px; margin-top: 5px;
        }

        /* --- CONTROL PANEL --- */
        .control-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #0891b2;
            padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.1);
        }
        
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #0891b2; padding-bottom: 10px;
        }
        .status-indicator {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
        }
        .rec-dot {
            width: 12px; height: 12px; border-radius: 50%; background: #475569;
            box-shadow: 0 0 0 transparent; transition: 0.3s;
        }
        .recording .rec-dot { background: #ef4444; box-shadow: 0 0 15px #ef4444; animation: pulseRec 1s infinite alternate; }
        .recording .status-text { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
        
        @keyframes pulseRec { from { opacity: 1; } to { opacity: 0.3; } }

        .language-select {
            background: #020617; border: 1px solid #00f0ff; color: #00f0ff;
            padding: 5px 10px; font-family: 'JetBrains Mono'; font-weight: 700;
            outline: none; cursor: crosshair;
        }

        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        
        .action-btn {
            background: rgba(0, 240, 255, 0.1); border: 1px solid #0891b2; color: #67e8f9;
            padding: 12px; text-align: center; font-weight: 700;
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-size: clamp(12px, 3vw, 14px);
            transition: 0.3s;
        }
        .action-btn:hover { background: rgba(0, 240, 255, 0.3); color: #fff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .action-btn:active { transform: scale(0.98); }
        .btn-stop { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .btn-stop:hover { background: rgba(239, 68, 68, 0.3); color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }

        /* --- AUDIO WAVE VISUALIZER (Simulated) --- */
        .visualizer {
            display: flex; align-items: center; justify-content: center; gap: 3px;
            height: 40px; margin-top: 10px; opacity: 0.2; transition: 0.3s;
        }
        .recording .visualizer { opacity: 1; }
        .bar {
            width: 4px; height: 5px; background: #00f0ff; border-radius: 2px;
            box-shadow: 0 0 10px #00f0ff; transition: height 0.1s;
        }
        .recording .bar { animation: wave 1s infinite ease-in-out; }
        .bar:nth-child(1) { animation-delay: 0.0s; } .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; } .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; } .bar:nth-child(6) { animation-delay: 0.5s; }
        .bar:nth-child(7) { animation-delay: 0.4s; } .bar:nth-child(8) { animation-delay: 0.3s; }
        .bar:nth-child(9) { animation-delay: 0.2s; } .bar:nth-child(10){ animation-delay: 0.1s; }
        
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 35px; } }

        /* --- TRANSCRIPTION LOG --- */
        .log-container {
            background: #000; border: 1px solid #334155; border-left: 3px solid #00f0ff;
            height: 350px; padding: 15px; overflow-y: auto;
            position: relative;
        }
        .log-header {
            color: #475569; font-size: 10px; font-weight: 700; margin-bottom: 10px;
            letter-spacing: 2px; border-bottom: 1px dashed #334155; padding-bottom: 5px;
        }
        
        .transcript-line {
            margin-bottom: 10px; line-height: 1.5; font-size: clamp(12px, 3.5vw, 14px);
            color: #e2e8f0; animation: fadeIn 0.3s ease-in;
        }
        .speaker-tag {
            color: #00f0ff; font-weight: 700; margin-right: 8px; font-size: 10px;
        }
        .final-text { color: #fff; }
        .interim-text { color: #94a3b8; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* Scrollbar styles */
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #0f172a; }
        .log-container::-webkit-scrollbar-thumb { background: #0891b2; }

    </style>
</head>
<body>

    <div class="engine-container">
        
        <div class="system-header">
            <h1>CALL_INTERCEPT_NODE</h1>
            <p>AI TRANSCRIBE ENGINE // NLP MODULE ACTIVE</p>
        </div>

        <div class="control-panel" id="controlPanel">
            
            <div class="status-bar">
                <div class="status-indicator">
                    <div class="rec-dot"></div>
                    <span class="status-text" id="statusText">STANDBY</span>
                </div>
                <select class="language-select" id="langSelect">
                    <option value="en-IN">EN (India)</option>
                    <option value="hi-IN">HI (Native)</option>
                </select>
            </div>

            <div class="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <div class="btn-grid">
                <button class="action-btn" id="startBtn">START INTERCEPT</button>
                <button class="action-btn btn-stop" id="stopBtn">TERMINATE</button>
            </div>

        </div>

        <div class="log-container" id="logBox">
            <div class="log-header">LIVE_DATA_STREAM // RAW_OUTPUT</div>
            </div>

    </div>

    <script>
        // Check for browser support
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const controlPanel = document.getElementById('controlPanel');
        const statusText = document.getElementById('statusText');
        const langSelect = document.getElementById('langSelect');
        const logBox = document.getElementById('logBox');
        
        let recognition;
        let isRecording = false;

        if (!window.SpeechRecognition) {
            statusText.innerText = "BROWSER NOT SUPPORTED";
            startBtn.disabled = true;
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            // Generate Timestamp
            const getTime = () => {
                const now = new Date();
                return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            };

            recognition.onstart = () => {
                isRecording = true;
                controlPanel.classList.add('recording');
                statusText.innerText = "INTERCEPTING...";
            };

            // Process audio data
            let currentLine = null;
            
            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // NOTE FOR FUTURE BACKEND: 
                // If you build a Python backend, you would intercept `finalTranscript` here,
                // send it to OpenAI Whisper via fetch(), and replace it with the Romanized Hindi string.

                if (interimTranscript && !currentLine) {
                    currentLine = document.createElement('div');
                    currentLine.className = 'transcript-line';
                    logBox.appendChild(currentLine);
                }

                if (currentLine) {
                    currentLine.innerHTML = `<span class="speaker-tag">${getTime()} OPR:</span> <span class="interim-text">${interimTranscript}</span><span class="final-text">${finalTranscript}</span>`;
                }

                if (finalTranscript) {
                    currentLine = null; // Reset for next sentence
                }

                // Auto-scroll to bottom
                logBox.scrollTop = logBox.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopRecording();
                statusText.innerText = `ERR: ${event.error.toUpperCase()}`;
            };

            recognition.onend = () => {
                // If it disconnects but we didn't hit stop, restart it (Auto-looping)
                if (isRecording) {
                    recognition.start();
                } else {
                    controlPanel.classList.remove('recording');
                    statusText.innerText = "STANDBY";
                }
            };
        }

        function startRecording() {
            if (isRecording) return;
            recognition.lang = langSelect.value;
            recognition.start();
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            recognition.stop();
            controlPanel.classList.remove('recording');
            statusText.innerText = "STANDBY";
        }

        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        
        // Restart engine if language changes while recording
        langSelect.addEventListener('change', () => {
            if (isRecording) {
                stopRecording();
                setTimeout(startRecording, 500);
            }
        });

    </script>
</body>
</html>
