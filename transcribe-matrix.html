<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Portal - Advanced Extraction Node</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        html, body { 
            width: 100%; min-height: 100%; 
            background-color: #ecfeff; 
            background-image: radial-gradient(circle at 50% 10%, #fff 0%, #ecfeff 100%);
            color: #0f172a; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 10px;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }

        .engine-container { width: 100%; max-width: 900px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }

        .system-header {
            text-align: center; padding: 15px 10px;
            border-top: 2px solid #00f0ff; border-bottom: 2px solid #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        .system-header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(16px, 5vw, 28px); font-weight: 900; color: #083344; 
            letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .system-header p {
            color: #0891b2; font-size: clamp(9px, 2.5vw, 12px); font-weight: 700; letter-spacing: 2px; margin-top: 5px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.8); border: 1px solid #0891b2; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; backdrop-filter: blur(5px);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.1), inset 0 0 15px rgba(6, 182, 212, 0.05);
        }

        /* --- NEW SETTINGS GRID --- */
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            border-bottom: 1px solid #0891b2; padding-bottom: 15px;
        }
        @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
        
        .setting-item { display: flex; flex-direction: column; gap: 5px; }
        .setting-item label { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900; color: #0369a1; letter-spacing: 1px; }
        
        .matrix-select {
            background: rgba(236, 254, 255, 0.5); border: 1px solid #0891b2; color: #0f172a;
            padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
            outline: none; width: 100%; cursor: crosshair;
        }
        .matrix-select:focus { border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: #0f172a;
        }

        .status-text { color: #0891b2; }
        .processing .status-text { color: #ea580c; text-shadow: 0 0 5px rgba(234, 88, 12, 0.3); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .upload-zone {
            border: 2px dashed #0891b2; background: rgba(236, 254, 255, 0.5);
            padding: 25px 15px; text-align: center; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .upload-zone:hover { background: rgba(207, 250, 254, 0.8); border-color: #0284c7; }
        .upload-icon { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.8; }
        .upload-text { font-size: 12px; font-weight: 700; color: #0369a1; letter-spacing: 1px; }
        .upload-file-name { font-size: 11px; color: #166534; margin-top: 8px; font-weight: bold; display: none; word-wrap: break-word; }

        input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .action-btn {
            background: rgba(255, 255, 255, 0.9); border: 1px solid #0891b2; color: #0c4a6e;
            padding: 15px; text-align: center; font-weight: 700; width: 100%;
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-size: clamp(12px, 3vw, 14px);
            transition: 0.3s; box-shadow: 0 4px 6px rgba(6, 182, 212, 0.1);
        }
        .action-btn:hover:not(:disabled) { background: rgba(165, 243, 252, 0.4); border-color: #00f0ff; color: #0369a1; box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .action-btn:disabled { background: #e2e8f0; border-color: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        .progress-bar-container { width: 100%; height: 6px; background: #cbd5e1; margin-top: 5px; display: none; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0ea5e9, #34d399); transition: width 0.2s; }

        /* --- DEDICATED TRANSCRIPT BOX --- */
        .transcript-display {
            background: rgba(255, 255, 255, 0.95); border: 2px solid #059669; border-radius: 4px;
            padding: 20px; display: none; box-shadow: 0 10px 25px rgba(5, 150, 105, 0.15);
        }
        .transcript-display-header {
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #065f46;
            border-bottom: 2px solid #34d399; padding-bottom: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .btn-group { display: flex; gap: 10px; }
        .util-btn {
            background: #059669; color: white; border: none; padding: 6px 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: bold;
            cursor: pointer; border-radius: 2px; transition: 0.2s;
        }
        .util-btn:hover { background: #047857; }
        .util-btn.export { background: #0284c7; }
        .util-btn.export:hover { background: #0369a1; }
        
        .transcript-text-content {
            font-size: clamp(13px, 3vw, 15px); line-height: 1.6; color: #0f172a;
            max-height: 400px; overflow-y: auto; padding-right: 10px;
        }
        
        /* Custom Scrollbar for transcript */
        .transcript-text-content::-webkit-scrollbar { width: 6px; }
        .transcript-text-content::-webkit-scrollbar-track { background: #f1f5f9; }
        .transcript-text-content::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }

        /* QA Chunk Formatting */
        .chunk-line { margin-bottom: 8px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .chunk-line:last-child { border-bottom: none; }
        .timestamp { color: #0284c7; font-weight: 700; font-size: 11px; margin-right: 8px; user-select: none; }

        /* --- TERMINAL LOGS --- */
        .log-container {
            background: #ffffff; border: 1px solid #cbd5e1; border-left: 3px solid #0891b2;
            height: 150px; padding: 15px; overflow-y: auto; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        .log-header { color: #64748b; font-size: 10px; font-weight: 700; margin-bottom: 10px; letter-spacing: 2px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }
        .sys-log { margin-bottom: 8px; font-size: 11px; color: #64748b; animation: fadeIn 0.2s ease-in; }
        .sys-log span { color: #0ea5e9; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .log-container::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }

    </style>
</head>
<body>

    <div class="engine-container">
        <div class="system-header">
            <h1>AUDIO_EXTRACTION_NODE</h1>
            <p>ADVANCED LOCAL AI // PRO-MATRIX ACTIVE</p>
        </div>

        <div class="control-panel" id="controlPanel">
            
            <div class="settings-grid">
                <div class="setting-item">
                    <label>AI NEURAL MODEL</label>
                    <select id="modelSelect" class="matrix-select">
                        <option value="Xenova/whisper-tiny">Tiny Model (~75MB) - Fast / Basic Audio</option>
                        <option value="Xenova/whisper-base" selected>Base Model (~145MB) - High Accuracy / Accents</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>OPERATIONAL TASK</label>
                    <select id="taskSelect" class="matrix-select">
                        <option value="translate">Translate Audio to English</option>
                        <option value="transcribe">Transcribe in Original Language</option>
                    </select>
                </div>
            </div>

            <div class="status-bar">
                <div>STAT: <span class="status-text" id="statusText">AWAITING AUDIO PAYLOAD</span></div>
            </div>

            <div class="upload-zone" id="dropZone">
                <span class="upload-icon">📁</span>
                <div class="upload-text" id="uploadInstruction">TAP TO SELECT AUDIO FILE</div>
                <div class="upload-file-name" id="fileNameDisplay"></div>
                <input type="file" id="audioInput" accept="audio/*">
            </div>

            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <button class="action-btn" id="processBtn" disabled>INITIALIZE EXTRACTION</button>
        </div>

        <div class="transcript-display" id="transcriptDisplayBox">
            <div class="transcript-display-header">
                <span>[QA TRANSCRIPTION DATA]</span>
                <div class="btn-group">
                    <button class="util-btn" id="copyBtn">COPY</button>
                    <button class="util-btn export" id="downloadBtn">EXPORT .TXT</button>
                </div>
            </div>
            <div class="transcript-text-content" id="finalTranscriptText"></div>
        </div>

        <div class="log-container" id="logBox">
            <div class="log-header">SYSTEM_TERMINAL // OPERATION_LOGS</div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.1';
        
        env.allowLocalModels = false;

        const audioInput = document.getElementById('audioInput');
        const uploadInstruction = document.getElementById('uploadInstruction');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const processBtn = document.getElementById('processBtn');
        const controlPanel = document.getElementById('controlPanel');
        const statusText = document.getElementById('statusText');
        const logBox = document.getElementById('logBox');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        
        const modelSelect = document.getElementById('modelSelect');
        const taskSelect = document.getElementById('taskSelect');

        const transcriptDisplayBox = document.getElementById('transcriptDisplayBox');
        const finalTranscriptText = document.getElementById('finalTranscriptText');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedFile = null;
        let transcriber = null;
        let loadedModelName = null;
        let rawExportText = ""; // Holds pure text for downloading

        audioInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                uploadInstruction.style.display = 'none';
                fileNameDisplay.style.display = 'block';
                fileNameDisplay.innerText = `[PAYLOAD LOCKED] ${selectedFile.name}`;
                
                processBtn.disabled = false;
                statusText.innerText = "READY FOR LOCAL EXTRACTION";
                transcriptDisplayBox.style.display = 'none'; 
            }
        });

        const getTime = () => {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        };

        function addLog(text, type = "sys") {
            const line = document.createElement('div');
            if (type === "sys") {
                line.className = 'sys-log';
                line.innerHTML = `<span>${getTime()} SYS:</span> ${text}`;
            } else if (type === "error") {
                line.className = 'sys-log';
                line.innerHTML = `<span style="color:#ef4444">${getTime()} ERR:</span> <span style="color:#ef4444">${text}</span>`;
            }
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function readAudioData(file) {
            const arrayBuffer = await file.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            return audioBuffer.getChannelData(0); 
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            audioInput.disabled = true;
            modelSelect.disabled = true;
            taskSelect.disabled = true;
            
            controlPanel.classList.add('processing');
            progressContainer.style.display = 'block';
            transcriptDisplayBox.style.display = 'none'; 
            
            try {
                const targetModel = modelSelect.value;
                const targetTask = taskSelect.value;

                // Reload model if they changed the dropdown
                if (!transcriber || loadedModelName !== targetModel) {
                    statusText.innerText = "DOWNLOADING NEURAL CORE...";
                    addLog(`Fetching ${targetModel}... (Requires cache update)`);
                    progressFill.style.width = "0%";
                    
                    transcriber = await pipeline('automatic-speech-recognition', targetModel, {
                        progress_callback: data => {
                            if (data.status === 'progress') {
                                progressFill.style.width = `${Math.round(data.progress)}%`;
                            }
                        }
                    });
                    loadedModelName = targetModel;
                    addLog("Model loaded and cached successfully.");
                }

                progressFill.style.width = "100%";
                statusText.innerText = "DECODING AUDIO...";
                addLog("Processing file into 16kHz float array...");
                
                const audioData = await readAudioData(selectedFile);

                statusText.innerText = `AI ${targetTask.toUpperCase()}ING...`;
                addLog(`Running inference. Task: ${targetTask.toUpperCase()}. Chunking timestamps active...`);

                // Run AI with Timestamp Chunking
                const output = await transcriber(audioData, {
                    task: targetTask,
                    return_timestamps: true,
                    chunk_length_s: 30,
                    stride_length_s: 5
                });

                // --- FORMAT TIMESTAMP CHUNKS FOR UI ---
                let formattedHTML = "";
                rawExportText = ""; // Reset export text

                if (output.chunks && output.chunks.length > 0) {
                    output.chunks.forEach(chunk => {
                        let start = chunk.timestamp[0].toFixed(2).padStart(5, '0');
                        let end = chunk.timestamp[1] !== null ? chunk.timestamp[1].toFixed(2).padStart(5, '0') : "END  ";
                        
                        formattedHTML += `<div class="chunk-line"><span class="timestamp">[${start}s - ${end}s]</span>${chunk.text}</div>`;
                        rawExportText += `[${start}s - ${end}s] ${chunk.text}\n`;
                    });
                } else {
                    // Fallback if timestamps fail
                    formattedHTML = `<div class="chunk-line">${output.text}</div>`;
                    rawExportText = output.text;
                }

                controlPanel.classList.remove('processing');
                audioInput.disabled = false;
                modelSelect.disabled = false;
                taskSelect.disabled = false;
                processBtn.innerText = "EXTRACTION COMPLETE";
                statusText.innerText = "STANDBY";
                progressContainer.style.display = 'none';

                addLog(`Extraction complete. UI populated.`);
                
                finalTranscriptText.innerHTML = formattedHTML;
                transcriptDisplayBox.style.display = 'block';

            } catch (error) {
                controlPanel.classList.remove('processing');
                audioInput.disabled = false;
                modelSelect.disabled = false;
                taskSelect.disabled = false;
                processBtn.innerText = "RETRY EXTRACTION";
                statusText.innerText = "SYSTEM ERROR";
                progressContainer.style.display = 'none';
                addLog(`Failure: ${error.message}`, "error");
            }
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(rawExportText).then(() => {
                copyBtn.innerText = "COPIED!";
                setTimeout(() => copyBtn.innerText = "COPY", 2000);
            });
        });

        // Download functionality
        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([rawExportText], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `QA_Transcript_${selectedFile ? selectedFile.name : "Output"}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

    </script>
</body>
</html>
