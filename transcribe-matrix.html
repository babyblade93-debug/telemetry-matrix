<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Portal - Local Extraction Node</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        html, body { 
            width: 100%; min-height: 100%; 
            background-color: #ecfeff; 
            background-image: radial-gradient(circle at 50% 10%, #fff 0%, #ecfeff 100%);
            color: #0f172a; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 10px;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }

        .engine-container { width: 100%; max-width: 900px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }

        .system-header {
            text-align: center; padding: 15px 10px;
            border-top: 2px solid #00f0ff; border-bottom: 2px solid #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        .system-header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(16px, 5vw, 28px); font-weight: 900; color: #083344; 
            letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .system-header p {
            color: #0891b2; font-size: clamp(9px, 2.5vw, 12px); font-weight: 700; letter-spacing: 2px; margin-top: 5px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.8); border: 1px solid #0891b2; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; backdrop-filter: blur(5px);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.1), inset 0 0 15px rgba(6, 182, 212, 0.05);
        }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #0891b2; padding-bottom: 10px;
            font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: #0f172a;
        }
        .lang-badge {
            background: rgba(8, 145, 178, 0.1); border: 1px solid #0891b2; color: #0369a1;
            padding: 4px 8px; border-radius: 2px; font-size: 11px; letter-spacing: 1px;
        }

        .status-text { color: #0891b2; }
        .processing .status-text { color: #ea580c; text-shadow: 0 0 5px rgba(234, 88, 12, 0.3); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .upload-zone {
            border: 2px dashed #0891b2; background: rgba(236, 254, 255, 0.5);
            padding: 30px 15px; text-align: center; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .upload-zone:hover { background: rgba(207, 250, 254, 0.8); border-color: #0284c7; }
        .upload-icon { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.8; }
        .upload-text { font-size: 12px; font-weight: 700; color: #0369a1; letter-spacing: 1px; }
        .upload-file-name { font-size: 11px; color: #166534; margin-top: 8px; font-weight: bold; display: none; word-wrap: break-word; }

        input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .action-btn {
            background: rgba(255, 255, 255, 0.9); border: 1px solid #0891b2; color: #0c4a6e;
            padding: 15px; text-align: center; font-weight: 700; width: 100%;
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-size: clamp(12px, 3vw, 14px);
            transition: 0.3s; box-shadow: 0 4px 6px rgba(6, 182, 212, 0.1);
        }
        .action-btn:hover:not(:disabled) { background: rgba(165, 243, 252, 0.4); border-color: #00f0ff; color: #0369a1; box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .action-btn:disabled { background: #e2e8f0; border-color: #cbd5e1; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        .progress-bar-container { width: 100%; height: 4px; background: #cbd5e1; margin-top: 10px; display: none; }
        .progress-fill { height: 100%; width: 0%; background: #0ea5e9; transition: width 0.2s; }

        /* --- NEW: DEDICATED TRANSCRIPT BOX --- */
        .transcript-display {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #059669;
            border-radius: 4px;
            padding: 20px;
            margin-top: 10px;
            display: none; /* Hidden until processing is done */
            box-shadow: 0 10px 25px rgba(5, 150, 105, 0.15);
        }
        .transcript-display-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px; font-weight: 700; color: #065f46;
            border-bottom: 2px solid #34d399; padding-bottom: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .copy-btn {
            background: #059669; color: white; border: none; padding: 5px 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: bold;
            cursor: pointer; border-radius: 2px; transition: 0.2s;
        }
        .copy-btn:hover { background: #047857; }
        .transcript-text-content {
            font-size: clamp(14px, 3.5vw, 16px); line-height: 1.6; color: #0f172a;
            white-space: pre-wrap; font-weight: 500;
        }

        /* --- TERMINAL LOGS --- */
        .log-container {
            background: #ffffff; border: 1px solid #cbd5e1; border-left: 3px solid #0891b2;
            height: 200px; padding: 15px; overflow-y: auto; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        .log-header { color: #64748b; font-size: 10px; font-weight: 700; margin-bottom: 10px; letter-spacing: 2px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }
        .sys-log { margin-bottom: 8px; font-size: 11px; color: #64748b; animation: fadeIn 0.2s ease-in; }
        .sys-log span { color: #0ea5e9; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .log-container::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }

    </style>
</head>
<body>

    <div class="engine-container">
        <div class="system-header">
            <h1>AUDIO_EXTRACTION_NODE</h1>
            <p>LOCAL AI ENGINE // ZERO-API BYPASS ACTIVE</p>
        </div>

        <div class="control-panel" id="controlPanel">
            <div class="status-bar">
                <div>MODE: <span class="lang-badge">TRANSLATE (TO EN)</span></div>
                <div>STAT: <span class="status-text" id="statusText">AWAITING FILE</span></div>
            </div>

            <div class="upload-zone" id="dropZone">
                <span class="upload-icon">📁</span>
                <div class="upload-text" id="uploadInstruction">TAP TO SELECT AUDIO FILE</div>
                <div class="upload-file-name" id="fileNameDisplay"></div>
                <input type="file" id="audioInput" accept="audio/*">
            </div>

            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <button class="action-btn" id="processBtn" disabled>PROCESS LOCALLY</button>
        </div>

        <div class="transcript-display" id="transcriptDisplayBox">
            <div class="transcript-display-header">
                <span>[FINAL TRANSCRIPTION OUTPUT]</span>
                <button class="copy-btn" id="copyBtn">COPY TEXT</button>
            </div>
            <div class="transcript-text-content" id="finalTranscriptText"></div>
        </div>

        <div class="log-container" id="logBox">
            <div class="log-header">SYSTEM_TERMINAL // LOCAL_AI_LOG</div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.1';
        
        env.allowLocalModels = false;

        const audioInput = document.getElementById('audioInput');
        const uploadInstruction = document.getElementById('uploadInstruction');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const processBtn = document.getElementById('processBtn');
        const controlPanel = document.getElementById('controlPanel');
        const statusText = document.getElementById('statusText');
        const logBox = document.getElementById('logBox');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        
        // New Output Elements
        const transcriptDisplayBox = document.getElementById('transcriptDisplayBox');
        const finalTranscriptText = document.getElementById('finalTranscriptText');
        const copyBtn = document.getElementById('copyBtn');

        let selectedFile = null;
        let transcriber = null;

        audioInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                uploadInstruction.style.display = 'none';
                fileNameDisplay.style.display = 'block';
                fileNameDisplay.innerText = `[FILE ACQUIRED] ${selectedFile.name}`;
                
                processBtn.disabled = false;
                statusText.innerText = "READY FOR LOCAL EXTRACTION";
                transcriptDisplayBox.style.display = 'none'; // Hide previous results
            }
        });

        const getTime = () => {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        };

        function addLog(text, type = "sys") {
            const line = document.createElement('div');
            if (type === "sys") {
                line.className = 'sys-log';
                line.innerHTML = `<span>${getTime()} SYS:</span> ${text}`;
            } else if (type === "error") {
                line.className = 'sys-log';
                line.innerHTML = `<span style="color:#ef4444">${getTime()} ERR:</span> <span style="color:#ef4444">${text}</span>`;
            }
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function readAudioData(file) {
            const arrayBuffer = await file.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            return audioBuffer.getChannelData(0); 
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            audioInput.disabled = true;
            controlPanel.classList.add('processing');
            progressContainer.style.display = 'block';
            transcriptDisplayBox.style.display = 'none'; // Keep hidden while processing
            
            try {
                if (!transcriber) {
                    statusText.innerText = "LOADING AI MODEL...";
                    addLog("Fetching Xenova/whisper-tiny model... (May take a minute on first run)");
                    
                    transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                        progress_callback: data => {
                            if (data.status === 'progress') {
                                progressFill.style.width = `${Math.round(data.progress)}%`;
                            }
                        }
                    });
                    addLog("Model loaded and cached successfully.");
                }

                progressFill.style.width = "100%";
                statusText.innerText = "DECODING AUDIO...";
                addLog("Decoding and resampling audio to 16kHz...");
                
                const audioData = await readAudioData(selectedFile);

                statusText.innerText = "AI TRANSLATING...";
                addLog("Running local neural network. Translating to English...");

                const output = await transcriber(audioData, {
                    task: 'translate',
                });

                // --- UI UPDATE: Push to Dedicated Box ---
                controlPanel.classList.remove('processing');
                audioInput.disabled = false;
                processBtn.innerText = "EXTRACTION COMPLETE";
                statusText.innerText = "STANDBY";
                progressContainer.style.display = 'none';

                addLog(`Extraction complete. Zero API keys used.`);
                
                // Show the large result box and inject text
                finalTranscriptText.innerText = output.text;
                transcriptDisplayBox.style.display = 'block';

            } catch (error) {
                controlPanel.classList.remove('processing');
                audioInput.disabled = false;
                processBtn.innerText = "RETRY EXTRACTION";
                statusText.innerText = "SYSTEM ERROR";
                progressContainer.style.display = 'none';
                addLog(`Failure: ${error.message}`, "error");
            }
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(finalTranscriptText.innerText).then(() => {
                copyBtn.innerText = "COPIED!";
                setTimeout(() => copyBtn.innerText = "COPY TEXT", 2000);
            });
        });

    </script>
</body>
</html>
