<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Architecture - Formula Intro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                linear-gradient(0deg, transparent 24%, rgba(15, 23, 42, 0.8) 25%, rgba(15, 23, 42, 0.8) 26%, transparent 27%, transparent 74%, rgba(15, 23, 42, 0.8) 75%, rgba(15, 23, 42, 0.8) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(15, 23, 42, 0.8) 25%, rgba(15, 23, 42, 0.8) 26%, transparent 27%, transparent 74%, rgba(15, 23, 42, 0.8) 75%, rgba(15, 23, 42, 0.8) 76%, transparent 77%, transparent);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #e2e8f0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- THE V3 INTRO CONTAINER --- */
        .intro-container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- STAGE 1: TERMINAL BOOT --- */
        .terminal-block {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 350px;
            height: 150px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #67e8f9;
            z-index: 50;
            overflow: hidden;
            border-left: 2px solid #06b6d4;
            padding-left: 10px;
            background: rgba(15, 23, 42, 0.6);
            opacity: 1;
            animation: terminalPulse 3s infinite ease-in-out;
        }
        @keyframes terminalPulse { 0%, 100% { border-color: #06b6d4; } 50% { border-color: transparent; } }

        .term-line {
            opacity: 0;
            animation: materializeText 0.1s forwards;
            white-space: nowrap;
        }
        .term-line::before { content: '> '; color: #22d3ee; font-weight: 800; }
        @keyframes materializeText { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STAGE 2: CENTRAL CORE ACTIVATION --- */
        .central-core-container {
            position: absolute;
            width: 300px;
            height: 300px;
            opacity: 0;
            transform: scale(0.5) rotate(-180deg);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .core-pulse {
            width: 250px; height: 250px;
            background: #ffffff;
            border: 8px solid #06b6d4;
            border-radius: 50%;
            box-shadow: 0 0 50px #22d3ee, inset 0 0 30px #67e8f9;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .core-pulse::before {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border-radius: 50%; border: 4px solid #67e8f9;
            animation: radarPulse 2s cubic-bezier(0.1, 0.7, 1, 0.1) infinite;
        }
        @keyframes radarPulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        .core-icon { font-size: 100px; filter: drop-shadow(0 0 10px #22d3ee); }

        .central-core-container::after {
            content: ''; position: absolute; width: 350px; height: 350px;
            border: 2px dashed rgba(6, 182, 212, 0.6);
            border-radius: 50%;
            animation: coreRotate 8s linear infinite;
        }
        @keyframes coreRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- STAGE 3: THE MERGE ZONΞ --- */
        .merge-zone {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            position: relative;
            z-index: 30;
            opacity: 0;
            transform: scale(1.1);
        }

        .merge-icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: absolute;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .m-icon { font-size: 60px; filter: drop-shadow(0 0 8px #67e8f9); color: white; }
        .m-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #bae6fd; font-weight: bold; text-transform: uppercase; background: rgba(15, 23, 42, 0.6); padding: 2px 6px; border-radius: 4px; }

        #icon-excel { left: 10%; top: 30%; transform: translateX(-200px); }
        #icon-word { left: 40%; top: 30%; transform: translateX(-200px); }
        #icon-ppt { left: 70%; top: 30%; transform: translateX(-200px); }

        #central-formulas {
            position: absolute;
            opacity: 0;
            transform: scale(0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #central-formulas .m-icon { font-size: 120px; color: #bae6fd; }
        #central-formulas .m-label { font-size: 16px; color: #38bdf8; background: #e0f2fe; }

        .data-trail { position: absolute; width: 4px; height: 100px; background: linear-gradient(180deg, transparent, #22d3ee, transparent); border-radius: 2px; opacity: 0; }

        /* --- STAGE 4: MATERIALIZE & TRANSITION --- */
        .final-title {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px #67e8f9, 0 0 40px #22d3ee, 0 0 60px #06b6d4;
            opacity: 0;
            z-index: 60;
        }
        .final-h1 { font-size: 60px; letter-spacing: -2px; line-height: 0.9; }
        .final-sub { font-size: 14px; color: #bae6fd; letter-spacing: 4px; margin-top: 15px; }

        .system-warp {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #06b6d4, #bae6fd);
            opacity: 1;
            z-index: 100;
            animation: systemWipe 1.5s forwards;
        }
        @keyframes systemWipe { 0% { opacity: 1; } 80%, 100% { opacity: 0; display: none; } }

        /* --- ANIMATION EXECUTION CLASSES --- */
        .run-central-core .central-core-container { opacity: 1; transform: scale(1) rotate(0deg); transition: all 1s ease-out; }
        .run-central-core .terminal-block { opacity: 0.3; transition: opacity 2s ease-in-out; }

        .run-merge-zone .merge-zone { opacity: 1; transform: scale(1); transition: all 0.5s ease-out; }
        .run-merge-zone .central-core-container { opacity: 0.2; transition: opacity 1s ease-in-out; }
        .run-merge-zone #icon-excel { transform: translateX(0); }
        .run-merge-zone #icon-word { transform: translateX(0); }
        .run-merge-zone #icon-ppt { transform: translateX(0); }

        .execute-merge .merge-icon-container { transform: translate(-50%, -50%) scale(0) !important; top: 50%; left: 50%; transition: all 1s cubic-bezier(0.7, 0, 0.3, 1); }
        .execute-merge #central-formulas { opacity: 1; transform: scale(1); transition: all 1s cubic-bezier(0.7, 0, 0.3, 1) 0.5s; }
        .execute-merge .data-trail { animation: trailFlash 1.5s forwards 0.2s; }
        @keyframes trailFlash { 0% { transform: translateY(100px); opacity: 0; } 50% { transform: translateY(0px); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        .materialize-final .central-formulas { transform: scale(0); opacity: 0; transition: all 0.5s ease-in; }
        .materialize-final .final-title { animation: finalFlash 2s forwards; }
        @keyframes finalFlash { 0% { opacity: 0; transform: scale(0.9); } 20%, 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.1); } }
        
    </style>
</head>
<body class="matrix-boot">

    <div class="intro-container" id="engine-target">
        
        <div class="terminal-block" id="term-engine"></div>

        <div class="central-core-container">
            <div class="core-pulse">
                <span class="core-icon">🌐</span>
            </div>
        </div>

        <div class="merge-zone">
            <div class="data-trail" style="top: 10%; left: 30%; height: 200px;"></div>
            <div class="data-trail" style="top: 50%; left: 80%; height: 200px; animation-delay: 0.1s;"></div>
            <div class="data-trail" style="top: 30%; left: 60%; height: 150px; animation-delay: 0.2s;"></div>

            <div class="merge-icon-container" id="icon-excel">
                <span class="m-icon">📊</span>
                <div class="m-label">EXCEL/GSHEETS</div>
            </div>
            <div class="merge-icon-container" id="icon-word" style="transition-delay: 0.1s;">
                <span class="m-icon">📄</span>
                <div class="m-label">WORD/WPS/DOCS</div>
            </div>
            <div class="merge-icon-container" id="icon-ppt" style="transition-delay: 0.2s;">
                <span class="m-icon">📽️</span>
                <div class="m-label">POWERPOINT</div>
            </div>

            <div id="central-formulas">
                <span class="m-icon">📂</span>
                <div class="m-label">FORMULAS</div>
            </div>
        </div>

        <div class="final-title">
            <div class="final-h1">GUIDANCE<br>ARCHITECTURE<br>MATRIX</div>
            <div class="final-sub">ACCESSING OPERATIONAL DATA STREAM</div>
        </div>

    </div>

    <div class="system-warp" id="system-warp"></div>

    <script>
        const termEngine = document.getElementById('term-engine');
        const engineTarget = document.getElementById('engine-target');
        
        const bootData = [
            `SYS_BOOT: Guidance_Core_Initialize... [ OK ]`,
            `CORE_ENGINE: Materializing AI Interface... [ OK ]`,
            `ACCESSING_RESOURCES... excel-matrix.html [ OK ]`,
            `ACCESSING_RESOURCES... docs-matrix.html [ OK ]`,
            `ACCESSING_RESOURCES... ppt-matrix.html [ OK ]`,
            `DATA_STREAM_SYNC: COMMENCED. newer_than:1d.`,
            `RA_ONΞ protocol: active.`,
            `Robot protocol: active.`,
            `ROBOCOP security interface: active.`,
            `SYSTEMS_READY...`
        ];

        let lineIndex = 0;
        function typeTerminalLines() {
            if (lineIndex < bootData.length) {
                const line = document.createElement('div');
                line.className = 'term-line';
                line.style.animationDelay = `${lineIndex * 0.2}s`;
                line.innerText = bootData[lineIndex];
                termEngine.appendChild(line);
                lineIndex++;
                setTimeout(typeTerminalLines, 200); 
            } else {
                setTimeout(stageTwoCentralCore, 1000);
            }
        }

        setTimeout(typeTerminalLines, 500); 

        function stageTwoCentralCore() {
            engineTarget.classList.add('run-central-core');
            setTimeout(stageThreeMergeZone, 2500);
        }

        function stageThreeMergeZone() {
            engineTarget.classList.add('run-merge-zone');
            setTimeout(stageFourExecuteMerge, 2500);
        }

        function stageFourExecuteMerge() {
            engineTarget.classList.add('execute-merge');
            setTimeout(stageFiveFinalMaterialize, 3000);
        }

        function stageFiveFinalMaterialize() {
            engineTarget.classList.add('materialize-final');
            setTimeout(stageSixTransition, 2500);
        }

        function stageSixTransition() {
            const warp = document.getElementById('system-warp');
            warp.style.display = 'block'; 

            setTimeout(() => {
                // REDIRECT TARGET: Sends user to the Sitemap Command Center
                window.location.href = 'formulas-index.html'; 
            }, 1000);
        }
    </script>
</body>
</html>
