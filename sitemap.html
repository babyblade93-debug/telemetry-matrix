<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Guidance Portal - Site Map</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6; 
            color: #1e293b; 
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .sitemap-container {
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            align-self: flex-start;
        }
        .header {
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            color: #0f172a;
            font-weight: 800;
        }
        .header p {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .tree-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        /* Mobile responsive grids */
        @media (min-width: 640px) {
            .tree-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .tree-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .menu-block {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .menu-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        
        .menu-header {
            background: #1e293b;
            color: #ffffff;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #3b82f6;
        }
        
        .dropdown-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .dropdown-item {
            border-bottom: 1px solid #e2e8f0;
        }
        .dropdown-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-link {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: #334155;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .dropdown-link::before {
            content: '↳';
            margin-right: 10px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 16px;
        }
        .dropdown-link:hover {
            background: #eff6ff;
            color: #2563eb;
            padding-left: 26px;
        }
        .dropdown-link:hover::before {
            color: #3b82f6;
        }
        .empty-menu-msg {
            padding: 14px 20px;
            color: #94a3b8;
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="sitemap-container">
        <div class="header">
            <h1>Portal Architecture & Site Map</h1>
            <p>System Directory Overview</p>
        </div>
        
        <div class="tree-grid" id="sitemap-render-target"></div>
    </div>

    <script>
        // =====================================================================
        // 🛠️ SITEMAP CONFIGURATION
        // Your exact Google Sites menu structure is loaded here.
        // =====================================================================
        
        const portalStructure = [
            {
                menuName: "Home",
                icon: "🏠",
                dropdowns: [
                    { name: "Advanced Excel and Gsheets", link: "#" }
                ]
            },
            {
                menuName: "Sitemap",
                icon: "🗺️",
                dropdowns: [] // No dropdowns for this menu yet
            }
        ];

        // =====================================================================
        // ⚙️ RENDER ENGINE: Automatically builds HTML from your list above
        // =====================================================================
        const renderTarget = document.getElementById('sitemap-render-target');

        portalStructure.forEach(section => {
            // Create Menu Block
            const block = document.createElement('div');
            block.className = 'menu-block';

            // Create Header (The Top Menu Name)
            const header = document.createElement('div');
            header.className = 'menu-header';
            header.innerHTML = `<span>${section.icon}</span> ${section.menuName}`;
            block.appendChild(header);

            // Create Dropdown List (The sub-items)
            if (section.dropdowns && section.dropdowns.length > 0) {
                const list = document.createElement('ul');
                list.className = 'dropdown-list';
                
                section.dropdowns.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'dropdown-item';
                    li.innerHTML = `<a href="${item.link}" class="dropdown-link">${item.name}</a>`;
                    list.appendChild(li);
                });
                block.appendChild(list);
            } else {
                // If there are no dropdowns, show a clean message
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'empty-menu-msg';
                emptyMsg.innerText = "No sub-pages currently attached.";
                block.appendChild(emptyMsg);
            }

            // Append completed block to the grid
            renderTarget.appendChild(block);
        });
    </script>
</body>
</html>
